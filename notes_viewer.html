<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notes • EPS</title>
  
  <link rel="stylesheet" href="design-tokens.css?v=20260110">
  <link rel="stylesheet" href="styles.css?v=20260110">
  <link id="theme-link" rel="stylesheet" href="theme-light.css?v=20260110">
  <script src="theme_manager.js?v=20260110"></script>
  
  <style>
    .page-header {
      background: var(--surface-1);
      padding: var(--space-6);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      margin-bottom: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      position: sticky;
      top: var(--space-4);
      z-index: var(--z-sticky);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      background: var(--surface-2);
      color: var(--text-color);
      font-family: inherit;
      transition: var(--transition-base);
    }

    .search-input:focus {
      outline: none;
      background: var(--bg-color);
      border-color: var(--primary-color);
      box-shadow: var(--shadow-focus);
    }

    .chip-row {
      display: flex;
      gap: var(--space-2);
      overflow-x: auto;
      padding-bottom: var(--space-1);
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .chip-row::-webkit-scrollbar { display: none; }

    .chip {
      background: var(--surface-2);
      color: var(--text-secondary);
      border: none;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      font-size: var(--font-size-xs);
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition-base);
    }

    .chip.active {
      background: var(--primary-color);
      color: #fff;
    }

    .catatan-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: var(--space-4);
    }

    .catatan-card {
      background: var(--surface-1);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      transition: var(--transition-base);
    }

    .catatan-card:hover {
      box-shadow: var(--shadow-lg);
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      background: var(--surface-2);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .judul {
      font-size: var(--font-size-lg);
      font-weight: 700;
      line-height: 1.3;
    }

    .summary {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .isi {
      font-size: var(--font-size-sm);
      line-height: 1.7;
      white-space: pre-wrap;
      display: none;
      padding-top: var(--space-4);
      border-top: 1px solid var(--surface-border);
    }

    .catatan-card.open .summary { display: none; }
    .catatan-card.open .isi { display: block; }

    /* Theme Selection Grid */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
    }

    .theme-option {
      background: var(--surface-2);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      cursor: pointer;
      transition: var(--transition-base);
    }

    .theme-option:hover {
      background: var(--surface-3);
      transform: translateY(-2px);
    }

    .theme-preview {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--surface-border);
    }

    @media (max-width: 640px) {
      .page-header { position: relative; top: 0; padding: var(--space-4); }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="page-header">
      <div class="header-top">
        <h1 style="font-size: var(--font-size-xl); font-weight: 700;">Notes</h1>
        <div style="display: flex; align-items: center; gap: var(--space-3);">
          <div style="font-size: var(--font-size-xs); font-weight: 600; color: var(--text-muted);">
            Total: <span id="totalCount">0</span>
          </div>
        </div>
      </div>
      <input type="text" id="search" class="search-input" placeholder="Cari catatan..." oninput="applyFilters()">
      <div class="chip-row" id="chipRow"></div>
    </div>

    <div id="dataContainer" class="catatan-grid"></div>
  </div>

  <!-- Theme Modal -->
  <div id="themeModal" class="modal-overlay" onclick="if(event.target==this)closeThemeModal()" style="display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 1000; padding: var(--space-4);">
    <div class="modal-content" style="background: var(--bg-color); border-radius: var(--radius-xl); padding: var(--space-8); width: 100%; max-width: 440px; box-shadow: var(--shadow-lg);">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-6);">
        <h3 style="margin: 0;">Pilih Tema</h3>
        <button class="btn btn-secondary btn-compact" onclick="closeThemeModal()">✕</button>
      </div>
      <div class="theme-grid">
        <div class="theme-option" onclick="selectTheme('default')">
          <div class="theme-preview" style="background: #FF0036;"></div>
          <span>Default</span>
        </div>
        <div class="theme-option" onclick="selectTheme('linear')">
          <div class="theme-preview" style="background: #5e6ad2;"></div>
          <span>Linear</span>
        </div>
        <div class="theme-option" onclick="selectTheme('vercel')">
          <div class="theme-preview" style="background: #000000;"></div>
          <span>Vercel</span>
        </div>
        <div class="theme-option" onclick="selectTheme('apple')">
          <div class="theme-preview" style="background: #0066cc;"></div>
          <span>Apple</span>
        </div>
        <div class="theme-option" onclick="selectTheme('supabase')">
          <div class="theme-preview" style="background: #3ecf8e;"></div>
          <span>Supabase</span>
        </div>
        <div class="theme-option" onclick="selectTheme('liquid-glass')">
          <div class="theme-preview" style="background: linear-gradient(135deg, #0f172a, #4c1d95); border: 1px solid rgba(255,255,255,0.4);"></div>
          <span>Liquid Glass</span>
        </div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-link">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="work_planner.html" class="nav-link">
      <span class="nav-icon">📋</span>
      <span>Planner</span>
    </a>
    <a href="notes_viewer.html" class="nav-link active">
      <span class="nav-icon">📓</span>
      <span>Notes</span>
    </a>
    <a href="cek_lembur/index.html" class="nav-link">
      <span class="nav-icon">⏱</span>
      <span>Lembur</span>
    </a>
    <a href="javascript:void(0)" class="nav-link" onclick="openThemeModal()">
      <span class="nav-icon">⚙️</span>
      <span>Settings</span>
    </a>
  </nav>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    function openThemeModal() {
      document.getElementById('themeModal').style.display = 'flex';
    }

    function closeThemeModal() {
      document.getElementById('themeModal').style.display = 'none';
    }

    function selectTheme(themeId) {
      setGlobalTheme(themeId);
      closeThemeModal();
    }

    // Firebase Config (from original file)
    const firebaseConfig = {
      apiKey: "AIzaSyAqqwSS1KTnAjfGcqvV_-TRHMYXJlTjtlI",
      authDomain: "catatan-troubleshoot-atm-2b5a4.firebaseapp.com",
      databaseURL: "https://catatan-troubleshoot-atm-2b5a4-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "catatan-troubleshoot-atm-2b5a4",
      storageBucket: "catatan-troubleshoot-atm-2b5a4.firebasestorage.app",
      messagingSenderId: "441198643571",
      appId: "1:441198643571:web:7ee3c056d933acb3515d06"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let semuaData = {};
    let tabsMap = {};
    let activeTab = 'all';

    function resolveTabName(item) {
      return item.tabName || (item.tabId && tabsMap[item.tabId]?.name) || item.kategori || 'General';
    }

    function renderChips() {
      const row = document.getElementById('chipRow');
      row.innerHTML = '';
      const counts = new Map();
      Object.values(semuaData).forEach(item => {
        const name = resolveTabName(item);
        counts.set(name, (counts.get(name) || 0) + 1);
      });

      const tabs = ['Semua', ...Array.from(counts.keys()).sort()];
      tabs.forEach(tab => {
        const val = tab === 'Semua' ? 'all' : tab;
        const btn = document.createElement('button');
        btn.className = `chip ${activeTab === val ? 'active' : ''}`;
        btn.textContent = tab === 'Semua' ? tab : `${tab} (${counts.get(tab)})`;
        btn.onclick = () => {
          activeTab = val;
          document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          applyFilters();
        };
        row.appendChild(btn);
      });
    }

    function buildCard(item) {
      const card = document.createElement('div');
      card.className = 'catatan-card';
      
      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.textContent = resolveTabName(item);

      const title = document.createElement('div');
      title.className = 'judul';
      title.textContent = item.judul || 'Untitled';

      const summary = document.createElement('div');
      summary.className = 'summary';
      summary.textContent = item.isi || '';

      const isi = document.createElement('div');
      isi.className = 'isi';
      isi.textContent = item.isi || '';

      const btn = document.createElement('button');
      btn.className = 'btn btn-secondary btn-compact';
      btn.textContent = 'Detail';
      btn.style.marginTop = 'auto';
      btn.onclick = () => {
        const open = card.classList.toggle('open');
        btn.textContent = open ? 'Tutup' : 'Detail';
      };

      card.appendChild(badge);
      card.appendChild(title);
      card.appendChild(summary);
      card.appendChild(isi);
      card.appendChild(btn);
      return card;
    }

    function applyFilters() {
      const q = document.getElementById('search').value.toLowerCase();
      const container = document.getElementById('dataContainer');
      container.innerHTML = '';
      let count = 0;

      Object.values(semuaData).forEach(item => {
        const tabMatch = activeTab === 'all' || resolveTabName(item) === activeTab;
        const textMatch = `${item.judul} ${item.isi}`.toLowerCase().includes(q);
        if (tabMatch && textMatch) {
          container.appendChild(buildCard(item));
          count++;
        }
      });
      document.getElementById('totalCount').textContent = count;
    }

    window.onload = () => {
      Promise.all([
        db.ref("tabs").once("value"),
        db.ref("catatan").once("value")
      ]).then(([tSnap, cSnap]) => {
        tabsMap = tSnap.val() || {};
        semuaData = cSnap.val() || {};
        renderChips();
        applyFilters();
      });
    };
  </script>
</body>

</html>
