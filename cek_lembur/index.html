<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cek Lembur • EPS</title>
  
  <link rel="stylesheet" href="../design-tokens.css?v=20260110">
  <link rel="stylesheet" href="../styles.css?v=20260110">
  <link id="theme-link" rel="stylesheet" href="../theme-light.css?v=20260110">
  <script src="../theme_manager.js?v=20260110" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <style>
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-6);
      border-bottom: 1px solid var(--surface-border);
      padding-bottom: var(--space-4);
    }

    .status-card {
      background: var(--surface-1);
      padding: var(--space-6);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      margin-bottom: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: var(--space-4);
    }

    .input-label {
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      margin-bottom: var(--space-1);
      display: block;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: var(--z-modal);
    }

    .lock-card {
      background: var(--bg-color);
      padding: var(--space-8);
      border-radius: var(--radius-xl);
      width: min(360px, 90vw);
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .hidden { display: none !important; }
  </style>
</head>

<body>
  <div class="modal-overlay" id="lockOverlay">
    <div class="lock-card">
      <h2 style="margin-bottom: var(--space-2);">Cek Lembur</h2>
      <p style="color: var(--text-secondary); margin-bottom: var(--space-6);">Halaman ini memerlukan password.</p>
      <input type="password" id="passInput" class="cell-edit" style="text-align: center; margin-bottom: var(--space-4);" placeholder="Password">
      <button id="unlockBtn" class="btn btn-primary" style="width: 100%;">Masuk</button>
      <div id="lockError" style="color: var(--danger-color); font-size: var(--font-size-xs); margin-top: var(--space-2);"></div>
    </div>
  </div>

  <div class="container hidden" id="app">
    <header class="page-header">
      <div>
        <div class="badge" style="background: var(--status-done-bg); color: var(--status-done-text); padding: 2px 8px; border-radius: var(--radius-full); font-size: 10px; font-weight: 700; text-transform: uppercase;">HR Safe</div>
        <h1 style="font-size: var(--font-size-xl); margin-top: 4px;">Cek Lembur</h1>
      </div>
      <div id="fileStatus" style="font-size: var(--font-size-xs); color: var(--text-secondary); font-weight: 600;">No file uploaded</div>
    </header>

    <div class="status-card">
      <div class="filters-grid">
        <div>
          <label class="input-label" for="fileInput">Excel File</label>
          <input type="file" id="fileInput" class="cell-edit" accept=".xlsx" />
        </div>
        <div>
          <label class="input-label" for="engineerSelect">Engineer</label>
          <select id="engineerSelect" class="cell-edit">
            <option value="">Semua Engineer</option>
          </select>
        </div>
        <div>
          <label class="input-label" for="holidayInput">Tanggal Merah (ddmmyyyy)</label>
          <textarea id="holidayInput" class="cell-edit" rows="2" placeholder="e.g. 25122025"></textarea>
        </div>
      </div>
      <div style="display: flex; gap: var(--space-3); margin-top: var(--space-2);">
        <button id="calcBtn" class="btn btn-primary">Hitung</button>
        <button id="topBtn" class="btn btn-secondary">Top 5</button>
      </div>
      <div id="statusText" style="font-size: var(--font-size-sm); color: var(--text-secondary);">Ready.</div>
    </div>

    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>Nama</th>
            <th>Weekday</th>
            <th>Weekend</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="resultBody">
          <tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding: var(--space-10);">Belum ada data.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="../index.html" class="nav-link">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </a>
    <a href="../work_planner.html" class="nav-link">
      <span class="nav-icon">📋</span>
      <span>Planner</span>
    </a>
    <a href="../notes_viewer.html" class="nav-link">
      <span class="nav-icon">📓</span>
      <span>Notes</span>
    </a>
    <a href="index.html" class="nav-link active">
      <span class="nav-icon">⏱</span>
      <span>Lembur</span>
    </a>
  </nav>

  <script>
    // Logic from original file
    const rupiah = new Intl.NumberFormat('id-ID', { maximumFractionDigits: 0 });
    const excelEpoch = Date.UTC(1899, 11, 30);
    const parseDate = (val) => {
      if (!val) return null;
      if (typeof val === 'number') return new Date(excelEpoch + val * 86400000);
      const d = new Date(val);
      return isNaN(d.getTime()) ? null : d;
    };
    const formatDateYYYYMMDD = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    const hashText = async (text) => {
      const enc = new TextEncoder().encode(text);
      const buf = await crypto.subtle.digest('SHA-256', enc);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    };

    const state = { rows: [], fileName: '' };
    
    // Auth logic
    const PASS_HASH = 'eba5984e33c9275acd448eaae8bee6f3b815d6420444930af638307a46e7fecf';
    const unlock = async () => {
      const h = await hashText('eps-lembur-v1' + document.getElementById('passInput').value.trim());
      if (h === PASS_HASH) {
        document.getElementById('lockOverlay').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
      } else {
        document.getElementById('lockError').textContent = 'Password salah.';
      }
    };
    document.getElementById('unlockBtn').onclick = unlock;
    document.getElementById('passInput').onkeypress = (e) => { if(e.key==='Enter') unlock(); };

    // File logic
    document.getElementById('fileInput').onchange = async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      const b = await f.arrayBuffer();
      const wb = XLSX.read(b, { type: 'array' });
      state.rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
      document.getElementById('fileStatus').textContent = `File: ${f.name}`;
      const names = new Set();
      state.rows.forEach(r => {
        const n = String(r['ENGINEER'] ?? r['Technical Support'] ?? '').trim();
        if(n) names.add(n);
      });
      const select = document.getElementById('engineerSelect');
      select.innerHTML = '<option value="">Semua Engineer</option>';
      Array.from(names).sort().forEach(n => {
        const o = document.createElement('option');
        o.value = n; o.textContent = n; select.appendChild(o);
      });
    };

    const calculate = (opts = {}) => {
      if(!state.rows.length) return;
      const hols = new Set(document.getElementById('holidayInput').value.split('\n').map(l => {
        const m = l.trim().match(/^(\d{2})(\d{2})(\d{4})$/);
        return m ? `${m[3]}-${m[2]}-${m[1]}` : null;
      }).filter(Boolean));
      
      const rekap = new Map();
      const engFilter = document.getElementById('engineerSelect').value.toLowerCase();
      const awarded = new Set();

      state.rows.forEach(row => {
        const eng = String(row['ENGINEER'] ?? row['Technical Support'] ?? '').trim();
        if(!eng) return;
        if(engFilter && eng.toLowerCase() !== engFilter) return;
        if(row['WAITING']) return;
        
        const start = parseDate(row['PENDING'] ? row['START-2'] : row['START']);
        const stop = parseDate(row['STOP']);
        if(!start || !stop) return;
        
        const hrs = (stop - start) / 3600000;
        if(hrs <= 0) return;
        if(!row['PENDING'] && !row['WAITING'] && hrs > 10 && !sameDay(start, stop)) return;

        const key = formatDateYYYYMMDD(start);
        const isWknd = [0, 6].includes(start.getDay());
        
        if(!rekap.has(eng)) rekap.set(eng, { name: eng, weekday: 0, weekend: 0 });
        const r = rekap.get(eng);

        if(hols.has(key)) {
          if(!awarded.has(eng + key)) {
            awarded.add(eng + key);
            if(isWknd) r.weekend += 250000; else r.weekday += 250000;
          }
        } else {
          const hrsFloor = Math.floor(hrs);
          if(hrsFloor >= 2) {
            const amt = hrsFloor * (isWknd ? 25000 : 20000);
            if(isWknd) r.weekend += amt; else r.weekday += amt;
          }
        }
      });

      let res = Array.from(rekap.values()).map(r => ({ ...r, total: r.weekday + r.weekend })).sort((a,b) => b.total - a.total);
      if(opts.top5) res = res.slice(0, 5);
      
      const body = document.getElementById('resultBody');
      body.innerHTML = '';
      res.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.name}</td><td>${rupiah.format(r.weekday)}</td><td>${rupiah.format(r.weekend)}</td><td><strong>${rupiah.format(r.total)}</strong></td>`;
        body.appendChild(tr);
      });
      document.getElementById('statusText').textContent = `Berhasil dihitung (${opts.top5 ? 'Top 5' : 'Semua'}).`;
    };

    document.getElementById('calcBtn').onclick = () => calculate();
    document.getElementById('topBtn').onclick = () => calculate({ top5: true });
  </script>
</body>

</html>
