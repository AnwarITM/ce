  <meta name="theme-color" content="#0070f3" />

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <meta name="mobile-web-app-capable" content="yes" />
  
  <script>
    const APP_VERSION = '20260110';
    const CACHE_PREFIX = 'eps-work-planner-v';
    const SW_URL = `./sw.js?v=${APP_VERSION}`;
    const SW_SCRIPT_URL = new URL(SW_URL, location.href).href;
    const IS_LOCALHOST = ['localhost', '127.0.0.1', '::1'].includes(location.hostname);
    const CAN_LOAD_MANIFEST = location.protocol === 'http:' || location.protocol === 'https:';
    const CAN_USE_SERVICE_WORKER = location.protocol === 'https:' || IS_LOCALHOST;

    if (CAN_LOAD_MANIFEST) {
      const manifestLink = document.createElement('link');
      manifestLink.rel = 'manifest';
      manifestLink.href = 'manifest.json';
      document.head.appendChild(manifestLink);
    }

    if (CAN_USE_SERVICE_WORKER && 'caches' in window) {
      const savedVersion = localStorage.getItem('eps-app-version');
      const alreadyRefreshed = sessionStorage.getItem('eps-version-refreshed');

      if (savedVersion !== APP_VERSION && !alreadyRefreshed) {
        caches.keys()
          .then((names) => Promise.all(
            names
              .filter((name) => name.startsWith(CACHE_PREFIX) && name !== `${CACHE_PREFIX}${APP_VERSION}`)
              .map((name) => caches.delete(name))
          ))
          .finally(() => {
            localStorage.setItem('eps-app-version', APP_VERSION);
            sessionStorage.setItem('eps-version-refreshed', 'yes');
            window.location.reload();
          });
      }
    }
  </script>

  <style>
    .hero-card {
      background: var(--surface-1);
      border-radius: var(--radius-xl);
      padding: var(--space-8) var(--space-8) var(--space-6);
      box-shadow: var(--shadow-lg);
      margin-top: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      position: relative;
    }

    .hero-main {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-6);
    }

    .hero-title {
      font-size: clamp(28px, 7vw, 40px);
      font-weight: 800;
      letter-spacing: -0.04em;
      margin: 0;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Theme Selection Grid */
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-3);
    }

    .theme-option {
      background: var(--surface-2);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      cursor: pointer;
      transition: var(--transition-base);
    }

    .theme-option:hover {
      background: var(--surface-3);
      transform: translateY(-2px);
    }

    .theme-preview {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 0 1px var(--surface-border);
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: var(--space-4);
      margin-top: var(--space-6);
    }

    .app-card {
      background: var(--surface-1);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      box-shadow: var(--shadow-md);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      transition: var(--transition-base);
    }

    .app-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .app-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .app-icon--planner { background: var(--gradient-primary); }
    .app-icon--notes { background: linear-gradient(135deg, #7928ca, #ff0080); }
    .app-icon--overtime { background: linear-gradient(135deg, #f5a623, #ff4d4d); }

    .app-title {
      font-size: var(--font-size-lg);
      font-weight: 600;
    }

    .app-desc {
      color: var(--text-secondary);
      font-size: var(--font-size-sm);
    }

    @media (max-width: 640px) {
      .hero-main { flex-direction: column; }
      .hero-actions { flex-direction: column; }
      .hero-actions .btn { width: 100%; }
      .hero-card { padding: var(--space-6); }
    }
  </style>
