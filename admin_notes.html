<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Catatan Troubleshoot ATM</title>
  <link rel="stylesheet" href="design-tokens.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --radius: 12px;
    }

    body {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
      background-color: var(--bg-color);
      min-height: 100vh;
      color: var(--text-color);
      font-family: var(--font-family);
    }

    .page-title {
      margin: 0 0 14px;
      font-size: 28px;
      font-weight: 800;
      color: var(--primary-color);
      letter-spacing: -0.4px;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .card {
      background: var(--surface-strong);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      transition: all 0.25s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .collapsible {
      padding: 0;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--surface-border);
    }

    .panel-head h2 {
      margin: 0;
      color: var(--text-color);
    }

    .panel-toggle {
      background: var(--surface-muted);
      border: 1px solid var(--surface-border);
      color: var(--primary-color);
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: none;
      transition: all 0.15s ease;
    }

    .panel-toggle:hover {
      background: var(--secondary-color);
    }

    .panel-body {
      padding: 16px;
      max-height: 2000px;
      overflow: hidden;
      opacity: 1;
      transition: all 0.3s ease;
    }

    .collapsible.collapsed .panel-body {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      pointer-events: none;
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 20px;
      font-weight: 800;
      color: #312e81;
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 13px;
      color: #475569;
      margin-bottom: 6px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 12px;
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 12px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #0f172a;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: rgba(79, 70, 229, 0.6);
      box-shadow: 0 10px 26px rgba(99, 102, 241, 0.15);
      transform: translateY(-1px);
    }

    textarea {
      resize: vertical;
      min-height: 140px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(99, 102, 241, 0.28);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 38px rgba(99, 102, 241, 0.32);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 10px 24px rgba(99, 102, 241, 0.24);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #0ea5e9, #6366f1);
    }

    .btn-ghost {
      width: auto;
      background: rgba(99, 102, 241, 0.08);
      color: #312e81;
      border: 1px solid rgba(99, 102, 241, 0.2);
      box-shadow: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(99, 102, 241, 0.12);
      color: #4338ca;
      border: 1px solid rgba(99, 102, 241, 0.18);
    }

    .tab-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tab-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(14, 165, 233, 0.12);
      border: 1px solid rgba(14, 165, 233, 0.2);
      font-weight: 700;
      font-size: 13px;
      color: #0f172a;
    }

    .tab-chip button {
      background: transparent;
      border: none;
      cursor: pointer;
      color: #ef4444;
      font-weight: 800;
      padding: 0;
    }

    .note-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }

    .note-card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 14px;
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.08);
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .note-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
    }

    .note-title {
      margin: 0;
      font-size: 16px;
      color: #0f172a;
      font-weight: 800;
      line-height: 1.4;
      flex: 1;
    }

    .note-toggle {
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.2);
      color: #312e81;
      border-radius: 10px;
      padding: 8px 10px;
      font-weight: 800;
      font-size: 12px;
      cursor: pointer;
      box-shadow: none;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .note-toggle:hover {
      background: rgba(99, 102, 241, 0.15);
    }

    .note-body {
      padding: 0 14px 12px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: opacity 0.25s ease, max-height 0.3s ease, padding 0.25s ease;
    }

    .note-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
      margin-bottom: 8px;
    }

    .note-body .isi {
      margin: 0;
      color: #334155;
      line-height: 1.6;
      white-space: pre-wrap;
      font-size: 14px;
      padding-top: 4px;
    }

    .note-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .note-actions button {
      width: auto;
      padding: 8px 12px;
      font-size: 13px;
    }

    .note-card.open .note-body {
      max-height: 4000px;
      opacity: 1;
      padding-top: 0;
      overflow: visible;
    }

    #notif {
      text-align: left;
      margin-top: 8px;
      font-weight: 600;
      color: #16a34a;
    }

    .hidden {
      display: none !important;
    }

    /* Tab Navigation */
    .admin-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 2px solid rgba(99, 102, 241, 0.2);
      padding-bottom: 0;
    }

    .admin-tab {
      padding: 12px 20px;
      background: rgba(99, 102, 241, 0.08);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      color: #312e81;
      transition: all 0.2s ease;
      margin-bottom: -2px;
    }

    .admin-tab:hover {
      background: rgba(99, 102, 241, 0.15);
    }

    .admin-tab.active {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      border-color: #6366f1;
      box-shadow: 0 -4px 12px rgba(99, 102, 241, 0.2);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* User Management Styles */
    .user-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .user-card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
      min-width: 200px;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 18px;
      flex-shrink: 0;
    }

    .user-details {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .user-name {
      font-weight: 700;
      color: #0f172a;
      font-size: 16px;
    }

    .user-id {
      font-size: 13px;
      color: #64748b;
    }

    .user-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 16px;
        border-radius: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .admin-tabs {
        flex-wrap: wrap;
      }

      .admin-tab {
        flex: 1;
        min-width: 120px;
        text-align: center;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .user-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .user-actions {
        width: 100%;
      }

      .user-actions .btn {
        flex: 1;
      }
    }
  </style>
</head>

<body>
  <h1 class="page-title">Admin Catatan Troubleshoot ATM</h1>
  <p class="subtitle">Atur catatan, tab/grup, dan konten teknikal.</p>

  <!-- Admin Login (Hidden by default) -->
  <div class="card hidden" id="loginForm">
    <h2>Login Admin</h2>
    <label for="adminPassword">Password</label>
    <input type="password" id="adminPassword" placeholder="Masukkan password admin">
    <button class="btn" onclick="login()">Login</button>
  </div>

  <script>
    // Check session flag from dashboard click
    (function() {
      const showLogin = sessionStorage.getItem('showAdminLogin');
      if (showLogin === 'true') {
        document.getElementById('loginForm').classList.remove('hidden');
        setTimeout(() => document.getElementById('adminPassword').focus(), 100);
        // Clear the flag
        sessionStorage.removeItem('showAdminLogin');
      }
    })();
  </script>

  <!-- Tab Navigation -->
  <div class="admin-tabs hidden" id="adminTabs">
    <button class="admin-tab active" onclick="switchTab('catatan')">📝 Catatan</button>
    <button class="admin-tab" onclick="switchTab('users')">👥 Manage Users</button>
  </div>

  <!-- Tab Content: Catatan -->
  <div class="tab-content active" id="tabCatatan">
    <div class="grid hidden" id="adminPanels">
      <div class="card collapsible collapsed" id="panelTabs">
        <div class="panel-head">
          <h2>Kelola Tab/Grup</h2>
          <button class="panel-toggle" type="button" onclick="togglePanel('panelTabs')">Buka</button>
        </div>
        <div class="panel-body">
          <label for="tabName">Nama tab baru</label>
          <input type="text" id="tabName" placeholder="contoh: BCA, DANAMON, NCR">
          <button class="btn btn-secondary" onclick="tambahTab()">Tambah Tab</button>
          <div class="tab-list" id="tabList"></div>
        </div>
      </div>

      <div class="card collapsible" id="panelForm">
        <div class="panel-head">
          <h2 id="formTitle">Input Catatan Baru</h2>
          <button class="panel-toggle" type="button" onclick="togglePanel('panelForm')">Tutup</button>
        </div>
        <div class="panel-body">
          <label for="judul">Judul</label>
          <input type="text" id="judul" placeholder="Judul catatan">

          <label for="kategori">Kategori (opsional)</label>
          <input type="text" id="kategori" placeholder="Misal: NCR, PSU, EPP">

          <label for="tabSelect">Pilih Tab/Grup</label>
          <select id="tabSelect">
            <option value="">Tidak ada tab</option>
          </select>

          <label for="isi">Isi catatan</label>
          <textarea id="isi" placeholder="Isi catatan troubleshooting..." rows="6"></textarea>

          <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <button class="btn" onclick="simpanCatatan()">Simpan Catatan</button>
            <button class="btn btn-ghost" type="button" onclick="resetForm()">Reset</button>
          </div>
          <p id="notif"></p>
        </div>
      </div>
    </div>

    <div class="card hidden" id="listPanel">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
        <h2 style="margin:0;">Daftar Catatan</h2>
        <span class="pill" id="countNotes">0 catatan</span>
      </div>
      <div class="tab-list" id="tabFilters"></div>
      <div id="daftarCatatan" class="note-list"></div>
    </div>
  </div>

  <!-- Tab Content: Users -->
  <div class="tab-content" id="tabUsers">
    <!-- Form User -->
    <div class="card" style="margin-bottom: 20px;">
      <h2 id="userFormTitle">Tambah User Baru</h2>
      <p style="color:#64748b; font-size:13px; margin-bottom:16px;">User ID digunakan untuk login di <strong>Work Planner</strong>. Halaman lain tetap bisa diakses tanpa login.</p>
      <div class="form-row">
        <div>
          <label for="userId">User ID</label>
          <input type="text" id="userId" placeholder="Contoh: 1033">
        </div>
        <div>
          <label for="userName">Nama</label>
          <input type="text" id="userName" placeholder="Contoh: John Doe">
        </div>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" onclick="saveUser()">Simpan User</button>
        <button class="btn btn-ghost" type="button" onclick="resetUserForm()">Reset</button>
      </div>
      <p id="userNotif" style="margin-top: 8px; font-weight: 600; color: #16a34a;"></p>
    </div>

    <!-- User List -->
    <div class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
        <h2 style="margin:0;">Daftar User</h2>
        <span class="pill" id="userCount">0 user</span>
      </div>
      <div class="user-list" id="userList"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAqqwSS1KTnAjfGcqvV_-TRHMYXJlTjtlI",
      authDomain: "catatan-troubleshoot-atm-2b5a4.firebaseapp.com",
      databaseURL: "https://catatan-troubleshoot-atm-2b5a4-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "catatan-troubleshoot-atm-2b5a4",
      storageBucket: "catatan-troubleshoot-atm-2b5a4.firebasestorage.app",
      messagingSenderId: "441198643571",
      appId: "1:441198643571:web:7ee3c056d933acb3515d06"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const passwordBenar = "admin123";
    let editingKey = null;
    let tabsMap = {};
    let activeTabFilter = "all";
    let editingUserId = null;
    let usersData = {};

    const el = (id) => document.getElementById(id);

    // Tab Switching
    function switchTab(tabName) {
      // Update active tab button
      document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      event.target.classList.add('active');

      // Show/hide tab content
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
      });
      document.getElementById('tab' + tabName.charAt(0).toUpperCase() + tabName.slice(1)).classList.add('active');

      // Load data for tab
      if (tabName === 'users') {
        loadUsers();
      }
    }

    function togglePanel(id) {
      const panel = el(id);
      if (!panel) return;
      const collapsed = panel.classList.toggle("collapsed");
      const btn = panel.querySelector(".panel-toggle");
      if (btn) btn.textContent = collapsed ? "Buka" : "Tutup";
    }

    function ensurePanelOpen(id) {
      const panel = el(id);
      if (!panel) return;
      panel.classList.remove("collapsed");
      const btn = panel.querySelector(".panel-toggle");
      if (btn) btn.textContent = "Tutup";
    }

    function login() {
      const input = el("adminPassword").value;
      if (input === passwordBenar) {
        el("loginForm").classList.add("hidden");
        el("adminTabs").classList.remove("hidden");
        el("tabCatatan").classList.remove("hidden");
        el("adminPanels").classList.remove("hidden");
        el("listPanel").classList.remove("hidden");
        el("adminPassword").value = "";
        loadTabs();
        loadCatatan();
      } else {
        alert("Password salah!");
      }
    }

    function renderTabOptions(selected = "") {
      const sel = el("tabSelect");
      sel.innerHTML = `<option value="">Tidak ada tab</option>`;
      Object.entries(tabsMap).forEach(([id, tab]) => {
        const opt = document.createElement("option");
        opt.value = id;
        opt.textContent = tab.name;
        sel.appendChild(opt);
      });
      sel.value = selected;
    }

    function renderTabList() {
      const list = el("tabList");
      list.innerHTML = "";
      const entries = Object.entries(tabsMap);
      if (entries.length === 0) {
        list.innerHTML = `<span class="pill">Belum ada tab</span>`;
        return;
      }
      entries.sort((a, b) => a[1].name.localeCompare(b[1].name))
        .forEach(([id, tab]) => {
          const chip = document.createElement("div");
          chip.className = "tab-chip";
          chip.innerHTML = `<span>${tab.name}</span>`;
          const del = document.createElement("button");
          del.title = "Hapus tab";
          del.textContent = "×";
          del.onclick = () => hapusTab(id);
          chip.appendChild(del);
        list.appendChild(chip);
      });
    }

    function renderTabFilters() {
      const wrap = el("tabFilters");
      if (!wrap) return;
      wrap.innerHTML = "";
      const entries = Object.entries(tabsMap).sort((a, b) => a[1].name.localeCompare(b[1].name));
      const allTabs = [["all", "Semua"], ...entries.map(([id, t]) => [id, t.name])];
      allTabs.forEach(([id, name]) => {
        const btn = document.createElement("button");
        btn.className = "chip";
        btn.type = "button";
        btn.textContent = name;
        if (activeTabFilter === id) btn.classList.add("active");
        btn.onclick = () => {
          activeTabFilter = id;
          renderCatatan(semuaDataCache);
          renderTabFilters();
        };
        wrap.appendChild(btn);
      });
    }

    function loadTabs() {
      db.ref("tabs").once("value", (snapshot) => {
        tabsMap = snapshot.val() || {};
        renderTabOptions(editingKey ? el("tabSelect").value : "");
        renderTabList();
        renderTabFilters();
      });
    }

    function tambahTab() {
      const name = el("tabName").value.trim();
      if (!name) return alert("Nama tab tidak boleh kosong.");
      const newRef = db.ref("tabs").push();
      newRef.set({ name }, (error) => {
        if (error) {
          alert("Gagal menambah tab.");
        } else {
          el("tabName").value = "";
          loadTabs();
        }
      });
    }

    function hapusTab(id) {
      if (!confirm("Hapus tab ini? Catatan yang memakai tab ini tidak ikut terhapus.")) return;
      db.ref("tabs/" + id).remove((error) => {
        if (error) {
          alert("Gagal menghapus tab.");
        } else {
          loadTabs();
        }
      });
    }

    function simpanCatatan() {
      const judul = el("judul").value.trim();
      const kategori = el("kategori").value.trim();
      const isi = el("isi").value.trim();
      const tabId = el("tabSelect").value;
      const tabName = tabId && tabsMap[tabId] ? tabsMap[tabId].name : "";

      if (!judul || !isi) {
        alert("Judul dan isi wajib diisi.");
        return;
      }

      const data = { judul, kategori, isi, tabId, tabName };

      if (editingKey) {
        db.ref("catatan/" + editingKey).set(data, (error) => {
          if (error) {
            alert("Gagal mengedit catatan.");
          } else {
            resetForm();
            el("notif").innerText = "Catatan berhasil diperbarui.";
            loadCatatan();
          }
        });
      } else {
        const newRef = db.ref("catatan").push();
        newRef.set(data, (error) => {
          if (error) {
            alert("Gagal menyimpan data.");
          } else {
            resetForm();
            el("notif").innerText = "Catatan berhasil disimpan.";
            loadCatatan();
          }
        });
      }
    }

    function resetForm() {
      editingKey = null;
      el("judul").value = "";
      el("kategori").value = "";
      el("isi").value = "";
      el("tabSelect").value = "";
      el("formTitle").innerText = "Input Catatan Baru";
      el("notif").innerText = "";
    }

    let semuaDataCache = {};

    function loadCatatan() {
      db.ref("catatan").once("value", (snapshot) => {
        const data = snapshot.val() || {};
        semuaDataCache = data;
        renderCatatan(data);
      });
    }

    function renderCatatan(data) {
      const wrapper = el("daftarCatatan");
      wrapper.innerHTML = "";
      const keys = Object.keys(data).filter((k) => {
        if (activeTabFilter === "all") return true;
        const item = data[k];
        return item.tabId === activeTabFilter;
      });
      el("countNotes").textContent = `${keys.length} catatan`;

      if (keys.length === 0) {
        wrapper.innerHTML = "<p style='text-align:center;'>Belum ada catatan.</p>";
        return;
      }

      keys.sort((a, b) => {
        const ja = (data[a].judul || "").toLowerCase();
        const jb = (data[b].judul || "").toLowerCase();
        return ja.localeCompare(jb);
      }).forEach((key) => {
        const item = data[key];
        const card = document.createElement("div");
        card.className = "note-card";

        const head = document.createElement("div");
        head.className = "note-head";

        const title = document.createElement("div");
        title.className = "note-title";
        title.textContent = item.judul || "(Tanpa judul)";

        const toggle = document.createElement("button");
        toggle.type = "button";
        toggle.className = "note-toggle";
        toggle.textContent = "Buka";

        head.appendChild(title);
        head.appendChild(toggle);

        const body = document.createElement("div");
        body.className = "note-body";

        const meta = document.createElement("div");
        meta.className = "note-meta";

        const tabName = item.tabName || (item.tabId && tabsMap[item.tabId]?.name) || "Tidak ada tab";
        const tabBadge = document.createElement("span");
        tabBadge.className = "pill";
        tabBadge.textContent = `Tab: ${tabName}`;
        meta.appendChild(tabBadge);

        if (item.kategori) {
          const cat = document.createElement("span");
          cat.className = "pill";
          cat.style.background = "rgba(14, 165, 233, 0.12)";
          cat.style.borderColor = "rgba(14, 165, 233, 0.2)";
          cat.textContent = `Kategori: ${item.kategori}`;
          meta.appendChild(cat);
        }

        const isi = document.createElement("p");
        isi.className = "isi";
        isi.textContent = item.isi || "";

        const actions = document.createElement("div");
        actions.className = "note-actions";
        const editBtn = document.createElement("button");
        editBtn.className = "btn";
        editBtn.textContent = "Edit";
        editBtn.onclick = (ev) => { ev.stopPropagation(); editCatatan(key); };

        const delBtn = document.createElement("button");
        delBtn.className = "btn btn-secondary";
        delBtn.textContent = "Hapus";
        delBtn.onclick = (ev) => { ev.stopPropagation(); hapusCatatan(key); };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);

        body.appendChild(meta);
        body.appendChild(isi);
        body.appendChild(actions);

        const setOpen = (open) => {
          card.classList.toggle("open", open);
          toggle.textContent = open ? "Tutup" : "Buka";
        };

        head.onclick = () => setOpen(!card.classList.contains("open"));
        toggle.onclick = (ev) => { ev.stopPropagation(); setOpen(!card.classList.contains("open")); };

        card.appendChild(head);
        card.appendChild(body);
        wrapper.appendChild(card);
      });
    }

    function editCatatan(key) {
      db.ref("catatan/" + key).once("value", (snapshot) => {
        const item = snapshot.val();
        if (item) {
          el("judul").value = item.judul || "";
          el("kategori").value = item.kategori || "";
          el("isi").value = item.isi || "";
          editingKey = key;
          el("formTitle").innerText = "Edit Catatan";
          renderTabOptions(item.tabId || "");
          el("tabSelect").value = item.tabId || "";
          ensurePanelOpen("panelForm");
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
    }

    function hapusCatatan(key) {
      if (confirm("Yakin ingin menghapus catatan ini?")) {
        db.ref("catatan/" + key).remove((error) => {
          if (error) {
            alert("Gagal menghapus catatan.");
          } else {
            loadCatatan();
          }
        });
      }
    }

    // ============================================
    // USER MANAGEMENT FUNCTIONS
    // ============================================

    function loadUsers() {
      db.ref("users").once("value", (snapshot) => {
        usersData = snapshot.val() || {};
        renderUserList();
      });
    }

    function renderUserList() {
      const list = el("userList");
      const entries = Object.entries(usersData).sort((a, b) => {
        const nameA = (a[1].name || '').toLowerCase();
        const nameB = (b[1].name || '').toLowerCase();
        return nameA.localeCompare(nameB);
      });

      el("userCount").textContent = `${entries.length} user`;

      if (entries.length === 0) {
        list.innerHTML = "<p style='text-align:center; color:#64748b;'>Belum ada user.</p>";
        return;
      }

      list.innerHTML = "";
      entries.forEach(([userId, user]) => {
        const card = document.createElement("div");
        card.className = "user-card";

        const avatar = document.createElement("div");
        avatar.className = "user-avatar";
        avatar.textContent = (user.name || userId).charAt(0).toUpperCase();

        const info = document.createElement("div");
        info.className = "user-info";

        const details = document.createElement("div");
        details.className = "user-details";

        const name = document.createElement("div");
        name.className = "user-name";
        name.textContent = user.name || "Tanpa nama";

        const uid = document.createElement("div");
        uid.className = "user-id";
        uid.textContent = `ID: ${userId}`;

        details.appendChild(name);
        details.appendChild(uid);
        info.appendChild(avatar);
        info.appendChild(details);

        const actions = document.createElement("div");
        actions.className = "user-actions";

        const editBtn = document.createElement("button");
        editBtn.className = "btn btn-secondary";
        editBtn.style.padding = "8px 12px";
        editBtn.style.fontSize = "13px";
        editBtn.textContent = "Edit";
        editBtn.onclick = () => editUser(userId);

        const delBtn = document.createElement("button");
        delBtn.className = "btn btn-danger";
        delBtn.style.padding = "8px 12px";
        delBtn.style.fontSize = "13px";
        delBtn.textContent = "Hapus";
        delBtn.onclick = () => deleteUser(userId);

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);

        card.appendChild(info);
        card.appendChild(actions);
        list.appendChild(card);
      });
    }

    function saveUser() {
      const userId = el("userId").value.trim();
      const userName = el("userName").value.trim();

      if (!userId) {
        alert("User ID wajib diisi!");
        return;
      }

      const userData = {
        userId: userId,
        name: userName || "",
        updatedAt: Date.now()
      };

      if (!editingUserId) {
        userData.createdAt = Date.now();
      }

      db.ref("users/" + userId).set(userData, (error) => {
        if (error) {
          alert("Gagal menyimpan user: " + error.message);
        } else {
          el("userNotif").innerText = editingUserId 
            ? "User berhasil diupdate!" 
            : "User berhasil ditambahkan!";
          resetUserForm();
          loadUsers();
          setTimeout(() => el("userNotif").innerText = "", 3000);
        }
      });
    }

    function editUser(userId) {
      const user = usersData[userId];
      if (user) {
        el("userId").value = userId;
        el("userId").disabled = true;
        el("userName").value = user.name || "";
        editingUserId = userId;
        el("userFormTitle").innerText = "Edit User";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function deleteUser(userId) {
      const user = usersData[userId];
      const userName = user?.name || userId;
      
      if (!confirm(`Yakin ingin menghapus user "${userName}" (ID: ${userId})?`)) {
        return;
      }

      db.ref("users/" + userId).remove((error) => {
        if (error) {
          alert("Gagal menghapus user: " + error.message);
        } else {
          if (editingUserId === userId) {
            resetUserForm();
          }
          loadUsers();
        }
      });
    }

    function resetUserForm() {
      editingUserId = null;
      el("userId").value = "";
      el("userId").disabled = false;
      el("userName").value = "";
      el("userFormTitle").innerText = "Tambah User Baru";
      el("userNotif").innerText = "";
    }
  </script>
</body>

</html>
