    <style>
        :root {
            --w-handle: 30px;
            --w-data: 180px;
            --w-catatan: 250px;
            --w-plan: 100px;
            --w-status: 120px;
        }

        /* Layout & Shell */
        body {
            background: #f8fafc;
            color: #0f172a;
            font-family: var(--font-family);
            padding-bottom: calc(var(--nav-height) + 32px); /* Room for bottom nav & FAB */
        }

        .page-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        .app-header {
            position: sticky;
            top: 0;
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            margin-bottom: 12px;
            z-index: var(--z-sticky);
            border-bottom: 1px solid #e2e8f0;
        }

        .app-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--primary-color);
            letter-spacing: -0.02em;
        }

        /* Login Overlay */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Tabs - Enterprise Underline (Sticky) */
        .tabs-wrapper {
            position: sticky;
            top: 56px; /* Below sticky header */
            background: #f8fafc;
            display: flex;
            align-items: center;
            gap: 24px;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 16px;
            padding: 4px 0;
            overflow-x: auto;
            z-index: calc(var(--z-sticky) - 1);
        }

        .tab-item {
            padding: 8px 4px;
            cursor: pointer;
            white-space: nowrap;
            color: #64748b;
            font-size: 13px;
            font-weight: 600;
            position: relative;
            transition: all 0.2s;
        }

        .tab-item:hover { color: var(--primary-color); }
        .tab-item.active { color: var(--primary-color); }
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary-color);
        }

        /* Dashboard Metrics - Compact */
        .dashboard-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .metric-card {
            background: #ffffff;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .metric-val {
            font-size: 20px;
            font-weight: 800;
            color: #0f172a;
        }

        .metric-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.05em;
        }

        /* Controls Area */
        .controls-card {
            background: #ffffff;
            padding: 24px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 24px;
        }

        .main-toolbar {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .import-area {
            flex: 1;
            min-width: 280px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Data Grid Table */
        .table-responsive {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th {
            background: #f8fafc;
            padding: 12px 16px;
            text-align: center;
            color: #475569;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid #e2e8f0;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
            text-align: center;
        }

        /* Status Badges */
        .status-btn {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .status-btn::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-btn.status-outstanding {
            background: #fef2f2;
            color: #991b1b;
            border-color: #fee2e2;
        }
        .status-btn.status-outstanding::before { background: #ef4444; }

        .status-btn.status-done {
            background: #f0fdf4;
            color: #166534;
            border-color: #dcfce7;
        }
        .status-btn.status-done::before { background: #10b981; }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-xl);
        }

        /* Utility */
        .wsid-text { font-weight: 700; color: var(--primary-color); }
        .notes-text { color: #475569; text-align: left; }
        
        @media (max-width: 768px) {
            .dashboard-row { grid-template-columns: 1fr; }
            .main-toolbar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>

    <!-- Firebase SDK -->

    <!-- Scripts -->
    <script src="theme_manager.js?v=20260110"></script>
    <script src="work_planner.js?v=20260501"></script>
    <script>
        // ============================================
        // FIREBASE CONFIG & LOGIN SYSTEM
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyAqqwSS1KTnAjfGcqvV_-TRHMYXJlTjtlI",
            authDomain: "catatan-troubleshoot-atm-2b5a4.firebaseapp.com",
            databaseURL: "https://catatan-troubleshoot-atm-2b5a4-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "catatan-troubleshoot-atm-2b5a4",
            storageBucket: "catatan-troubleshoot-atm-2b5a4.firebasestorage.app",
            messagingSenderId: "441198643571",
            appId: "1:441198643571:web:7ee3c056d933acb3515d06"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Login state
        let currentUserId = null;
        let isFirebaseSynced = false;
        let saveTimeout = null; // Debounce timer

        function setAuthViewState(state) {
            document.body.classList.remove('auth-pending', 'auth-login-required', 'auth-ready');
            document.body.classList.add(state);
        }

        function setLoginError(message = '') {
            const errorEl = document.getElementById('loginError');
            if (errorEl) errorEl.textContent = message;
        }

        // Check auth on load
        function checkAuth() {
            const savedUserId = sessionStorage.getItem('userId');
            if (savedUserId) {
                setAuthViewState('auth-pending');
                validateUserAndLoad(savedUserId);
            } else {
                showLoginOverlay();
            }
        }

        function showLoginOverlay() {
            const overlay = document.getElementById('loginOverlay');
            if (overlay) {
                setAuthViewState('auth-login-required');
                overlay.style.display = 'flex';
                setLoginError('');
                // Focus on input for better UX
                setTimeout(() => {
                    const input = document.getElementById('loginUserId');
                    if (input) input.focus();
                }, 100);
            }
        }

        function hideLoginOverlay() {
            const overlay = document.getElementById('loginOverlay');
            if (overlay) overlay.style.display = 'none';
            setLoginError('');
            setAuthViewState('auth-ready');
            
            // Show user info bar
            const userInfoBar = document.getElementById('userInfoBar');
            const userAvatar = document.getElementById('userAvatar');
            const userInfoText = document.getElementById('userInfoText');
            
            if (userInfoBar) {
                userInfoBar.classList.add('show');
                const userName = sessionStorage.getItem('userName') || currentUserId;
                userAvatar.textContent = (userName || '👤').charAt(0).toUpperCase();
                userInfoText.textContent = `Welcome, ${userName}`;
            }
        }

        async function validateUserAndLoad(userId) {
            try {
                const snapshot = await db.ref('users/' + userId).once('value');
                const user = snapshot.val();
                
                if (user) {
                    currentUserId = userId;
                    sessionStorage.setItem('userId', userId);
                    sessionStorage.setItem('userName', user.name || userId);
                    hideLoginOverlay();
                    
                    // Load from Firebase (start fresh, no migration)
                    loadWorkPlannerFromFirebase(userId);
                } else {
                    setLoginError('User ID tidak ditemukan.');
                    sessionStorage.removeItem('userId');
                    showLoginOverlay();
                }
            } catch (error) {
                console.error('Error validating user:', error);
                setLoginError('Gagal koneksi ke database. Cek koneksi internet.');
                showLoginOverlay();
            }
        }

        function login() {
            const userIdInput = document.getElementById('loginUserId').value.trim();
            if (!userIdInput) {
                setLoginError('User ID wajib diisi.');
                return;
            }
            setLoginError('');
            validateUserAndLoad(userIdInput);
        }

        async function logout() {
            const confirmed = await app.showConfirm({
                title: 'Logout',
                message: 'Logout?',
                confirmText: 'Logout',
                isDanger: true
            });

            if (confirmed) {
                sessionStorage.removeItem('userId');
                sessionStorage.removeItem('userName');
                window.location.href = 'index.html';
            }
        }

        // ============================================
        // FIREBASE SYNC FUNCTIONS (REAL-TIME)
        // ============================================
        let isLocalChange = false; // Flag to prevent infinite loops

        function loadWorkPlannerFromFirebase(userId) {
            // Use real-time listener for instant sync across devices
            db.ref('work_planner/' + userId).on('value', (snapshot) => {
                // If we're currently pushing a local change, ignore incoming sync
                // to prevent race conditions or "echo" overwrites
                if (isLocalChange) return;

                const data = snapshot.val();

                // Initialize app.state if not exists
                if (!app.state) {
                    app.state = { tabs: [], currentTabId: 0 };
                }

                if (data && data.tabs) {
                    // Sync dari Firebase ke app state
                    const firebaseTabs = Object.entries(data.tabs || {}).map(([id, tab]) => ({
                        ...(tab || {}),
                        id: tab?.id ?? Number(id)
                    })).sort((a, b) => a.id - b.id);
                    
                    const firebaseCurrentTabId = data.currentTabId || 0;

                    // Check if data actually changed
                    const hasChanges = JSON.stringify(app.state.tabs) !== JSON.stringify(firebaseTabs) ||
                                      app.state.currentTabId !== firebaseCurrentTabId;

                    if (hasChanges) {
                        app.state.tabs = firebaseTabs;
                        app.state.currentTabId = firebaseCurrentTabId;

                        app.normalizeState(true); // skipSave=true to avoid redundant Firebase sync
                        originalSaveState(); // Save locally without triggering Firebase
                        app.renderTabs();
                        app.renderUI();
                        console.log('🔄 Data synced from Firebase');
                    }
                    isFirebaseSynced = true;
                } else {
                    // No data in Firebase, start fresh
                    app.state.tabs = [createNewTab(0)];
                    app.state.currentTabId = 0;
                    app.normalizeState();
                    originalSaveState();
                    app.renderTabs();
                    app.renderUI();
                    isFirebaseSynced = true;
                }
            }, (error) => {
                console.error('Error listening to Firebase:', error);
            });
        }

        function saveWorkPlannerToFirebase(userId) {
            if (!userId || !isFirebaseSynced) return;

            if (saveTimeout) clearTimeout(saveTimeout);

            saveTimeout = setTimeout(() => {
                isLocalChange = true;
                
                db.ref('work_planner/' + userId).update({
                    currentTabId: app.state.currentTabId,
                    tabs: app.state.tabs.reduce((acc, tab) => {
                        acc[tab.id] = {
                            id: tab.id,
                            name: tab.name,
                            sortMode: tab.sortMode || 'date',
                            excelConfig: tab.excelConfig || {},
                            data: tab.data || []
                        };
                        return acc;
                    }, {})
                }, (error) => {
                    if (error) {
                        console.error('Firebase save error:', error);
                        isLocalChange = false;
                    } else {
                        console.log('✅ Data saved to Firebase');
                        // Small delay before allowing sync to process "echoes"
                        setTimeout(() => { isLocalChange = false; }, 200);
                    }
                });
            }, 500);
        }

        // Override app.saveState to sync with Firebase
        const originalSaveState = app.saveState.bind(app);
        app.saveState = function() {
            originalSaveState();
            if (currentUserId && isFirebaseSynced) {
                // Set isLocalChange to true immediately when a change happens locally
                // This prevents the sync listener from overwriting the state while we wait for debounce
                isLocalChange = true;
                saveWorkPlannerToFirebase(currentUserId);
            }
        };

        // Initialize auth check after app init
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
        });

        // Disable ServiceWorker for file:// protocol (testing only)
        if (window.location.protocol === 'file:') {
            console.warn('Running on file:// protocol - ServiceWorker disabled. Use local server for full functionality.');
        } else {
            const APP_VERSION = '20260110';
            const SW_URL = `./sw.js?v=${APP_VERSION}`;
            const SW_SCRIPT_URL = new URL(SW_URL, location.href).href;

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then((regs) => {
                    regs.forEach((reg) => {
                        if (reg.active && reg.active.scriptURL !== SW_SCRIPT_URL) {
                            reg.unregister();
                        }
                    });
                });

                navigator.serviceWorker.register(SW_URL, { updateViaCache: 'none' })
                    .then((reg) => {
                        reg.update();
                    })
                    .catch((err) => {
                        console.error('SW registration failed', err);
                    });

                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (refreshing) return;
                    refreshing = true;
                    window.location.reload();
                });
            }
        }
    </script>
